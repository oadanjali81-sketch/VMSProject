<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Menu Bar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            /* Simulating the purple container edge from the picture */
            background-color: #a855f7; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            padding: 40px 0;
        }

        .phone-wrapper {
            background-color: #ffffff;
            border-radius: 40px;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .menu-container {
            background-color: #171520;
            padding: 12px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 420px;
            justify-content: space-between;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            border-radius: 40px;
            cursor: pointer;
            text-decoration: none;
            color: #6c667c;
            transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            background: transparent;
        }

        .menu-item:hover {
            color: #a19bad;
        }

        .menu-item.active {
            background-color: #ffffff;
            color: #171520;
            padding: 14px 26px;
        }

        .menu-icon {
            font-size: 1.25rem;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.45s;
        }

        .menu-text {
            font-weight: 600;
            font-size: 1rem;
            max-width: 0;
            opacity: 0;
            margin-left: 0;
            overflow: hidden;
            white-space: nowrap;
            transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
        }

        .menu-item.active .menu-text {
            max-width: 120px;
            opacity: 1;
            margin-left: 12px;
        }

        .menu-item.active .menu-icon {
            color: #171520;
        }
        
        /* FontAwesome tweaks */
        .fa-solid { font-size: 1.2rem; }

    </style>
</head>
<body>

    <div class="phone-wrapper">
        <!-- 1st State: Home Active -->
        <div class="menu-container">
            <a class="menu-item active" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-house"></i></span>
                <span class="menu-text">Home</span>
            </a>
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                <span class="menu-text">Search</span>
            </a>
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-percent"></i></span>
                <span class="menu-text">Offers</span>
            </a>
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-basket-shopping"></i></span>
                <span class="menu-text">Cart</span>
            </a>
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-regular fa-circle-user"></i></span>
                <span class="menu-text">Profile</span>
            </a>
        </div>

        <!-- 2nd State: Search Active -->
        <div class="menu-container">
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-house"></i></span>
                <span class="menu-text">Home</span>
            </a>
            <a class="menu-item active" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                <span class="menu-text">Search</span>
            </a>
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-percent"></i></span>
                <span class="menu-text">Offers</span>
            </a>
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-basket-shopping"></i></span>
                <span class="menu-text">Cart</span>
            </a>
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-regular fa-circle-user"></i></span>
                <span class="menu-text">Profile</span>
            </a>
        </div>

        <!-- 3rd State: Offers Active -->
        <div class="menu-container">
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-house"></i></span>
                <span class="menu-text">Home</span>
            </a>
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                <span class="menu-text">Search</span>
            </a>
            <a class="menu-item active" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-percent"></i></span>
                <span class="menu-text">Offers</span>
            </a>
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-basket-shopping"></i></span>
                <span class="menu-text">Cart</span>
            </a>
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-regular fa-circle-user"></i></span>
                <span class="menu-text">Profile</span>
            </a>
        </div>

        <!-- 4th State: Cart Active -->
        <div class="menu-container">
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-house"></i></span>
                <span class="menu-text">Home</span>
            </a>
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                <span class="menu-text">Search</span>
            </a>
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-percent"></i></span>
                <span class="menu-text">Offers</span>
            </a>
            <a class="menu-item active" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-basket-shopping"></i></span>
                <span class="menu-text">Cart</span>
            </a>
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-regular fa-circle-user"></i></span>
                <span class="menu-text">Profile</span>
            </a>
        </div>

        <!-- 5th State: Profile Active -->
        <div class="menu-container">
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-house"></i></span>
                <span class="menu-text">Home</span>
            </a>
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                <span class="menu-text">Search</span>
            </a>
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-percent"></i></span>
                <span class="menu-text">Offers</span>
            </a>
            <a class="menu-item" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-solid fa-basket-shopping"></i></span>
                <span class="menu-text">Cart</span>
            </a>
            <a class="menu-item active" onclick="setActive(this)">
                <span class="menu-icon"><i class="fa-regular fa-circle-user"></i></span>
                <span class="menu-text">Profile</span>
            </a>
        </div>
    </div>

    <script>
        function setActive(clickedItem) {
            const container = clickedItem.closest('.menu-container');
            container.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });
            clickedItem.classList.add('active');
        }
    </script>
</body>
</html>
